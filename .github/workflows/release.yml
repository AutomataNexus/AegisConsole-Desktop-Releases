name: Release

# Cut a release by pushing a version tag (e.g. v0.1.0) to THIS public repo. The
# pipeline checks out the PRIVATE source, gates it (fmt + clippy -D warnings +
# tests), builds the hardened desktop installers AND the self-host container, and
# publishes everything here with SLSA provenance L3 attestation.
on:
  push:
    tags: ["v*.*.*"]
  workflow_dispatch:
    inputs:
      source_ref:
        description: "Ref of the private source to build (default: main)"
        default: "main"

env:
  SOURCE_REPO: AutomataNexus/AegisConsole-Desktop
  IMAGE: ghcr.io/automatanexus/aegisconsole-desktop

permissions: {}

jobs:
  # ── desktop installers (built from private source) ──
  build:
    name: Installer (${{ matrix.os }})
    permissions:
      contents: read
    strategy:
      fail-fast: false
      matrix:
        include:
          - { os: ubuntu-latest,  bundles: "deb,appimage" }
          - { os: windows-latest, bundles: "nsis" }
          - { os: macos-latest,   bundles: "dmg" }
    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout private source
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.source_ref || 'main' }}
          token: ${{ secrets.PROJECTOPERATIONS }}
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - uses: dtolnay/rust-toolchain@stable
        with: { components: "rustfmt, clippy" }
      - name: Linux deps
        if: matrix.os == 'ubuntu-latest'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: Obfuscate UI
        run: |
          npm i -g @swc/cli @swc/core
          bash scripts/obfuscate.sh
      - name: Gate (fmt + clippy -D warnings + tests)
        run: bash scripts/gate.sh
      - name: Install tauri-cli
        run: cargo install tauri-cli --version "^2" --locked
      - name: Build bundles
        working-directory: src-tauri
        run: cargo tauri build --bundles ${{ matrix.bundles }}
      - name: Stage + hash
        shell: bash
        run: |
          mkdir -p dist
          find src-tauri/target/release/bundle -type f \
            \( -name '*.deb' -o -name '*.AppImage' -o -name '*.dmg' -o -name '*-setup.exe' -o -name '*.msi' \) \
            -exec cp {} dist/ \; || true
          ( cd dist && sha256sum * > "../hashes-${{ matrix.os }}.txt" )
          cat "hashes-${{ matrix.os }}.txt"
      - uses: actions/upload-artifact@v4
        with: { name: "bundles-${{ matrix.os }}", path: "dist/*", if-no-files-found: error }
      - uses: actions/upload-artifact@v4
        with: { name: "hashes-${{ matrix.os }}", path: "hashes-${{ matrix.os }}.txt" }

  combine-hashes:
    name: Combine installer hashes
    needs: build
    runs-on: ubuntu-latest
    permissions: { contents: read }
    outputs:
      hashes: ${{ steps.h.outputs.hashes }}
    steps:
      - uses: actions/download-artifact@v4
        with: { pattern: "hashes-*", merge-multiple: true, path: hashes }
      - id: h
        run: |
          cat hashes/*.txt > all.txt
          echo "hashes=$(base64 -w0 all.txt)" >> "$GITHUB_OUTPUT"

  # ── self-host container image (built from private source UI) ──
  container:
    name: Container image (GHCR + provenance)
    permissions:
      contents: read
      packages: write
      id-token: write
      attestations: write
    runs-on: ubuntu-latest
    steps:
      - name: Checkout this (public) repo — deploy/ + Dockerfile
        uses: actions/checkout@v4
      - name: Checkout private source into ./src
        uses: actions/checkout@v4
        with:
          repository: ${{ env.SOURCE_REPO }}
          ref: ${{ github.event.inputs.source_ref || 'main' }}
          token: ${{ secrets.PROJECTOPERATIONS }}
          path: src
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - name: Obfuscate UI from source → ui-dist
        run: |
          npm i -g @swc/cli @swc/core
          ( cd src && bash scripts/obfuscate.sh )
          rm -rf ui-dist && cp -r src/ui-dist ui-dist
      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3
      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - id: push
        uses: docker/build-push-action@v6
        with:
          context: .
          file: deploy/Dockerfile
          platforms: linux/amd64,linux/arm64
          push: true
          tags: |
            ${{ env.IMAGE }}:${{ github.ref_name }}
            ${{ env.IMAGE }}:latest
      - name: Attest image provenance
        uses: actions/attest-build-provenance@v1
        with:
          subject-name: ${{ env.IMAGE }}
          subject-digest: ${{ steps.push.outputs.digest }}
          push-to-registry: true

  # ── publish the GitHub release (installers + deploy manifests) ──
  release:
    name: Publish release
    needs: [build, container]
    runs-on: ubuntu-latest
    permissions: { contents: write }
    steps:
      - uses: actions/checkout@v4   # this repo, for deploy manifests
      - uses: actions/download-artifact@v4
        with: { pattern: "bundles-*", merge-multiple: true, path: dist }
      - name: Bundle deploy manifests
        run: |
          cp deploy/docker-compose.yml dist/aegisconsole-docker-compose.yml
          cp deploy/k8s/aegisconsole.yaml dist/aegisconsole-k8s.yaml
      - name: Create release
        env: { GH_TOKEN: "${{ github.token }}" }
        run: |
          gh release create "${{ github.ref_name }}" dist/* \
            --repo "${{ github.repository }}" \
            --title "AegisConsole Desktop ${{ github.ref_name }}" \
            --notes "Installers (Windows/macOS/Linux) + Docker/Kubernetes deploy manifests. Container: \`${{ env.IMAGE }}:${{ github.ref_name }}\`. Verify with slsa-verifier (installers) / gh attestation verify (image)." \
            --verify-tag

  # ── SLSA provenance L3 over the installers ──
  provenance:
    name: SLSA L3 provenance (installers)
    needs: [combine-hashes, release]
    permissions:
      actions: read
      id-token: write
      contents: write
    uses: slsa-framework/slsa-github-generator/.github/workflows/generator_generic_slsa3.yml@v2.1.0
    with:
      base64-subjects: ${{ needs.combine-hashes.outputs.hashes }}
      upload-assets: true
      provenance-name: aegisconsole-desktop.intoto.jsonl
